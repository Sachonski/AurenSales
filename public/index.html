<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inbound Home Health · Today's Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c1016;--panel:#141b25;--panel-2:#0f151e;--line:#222d3b;--line-soft:#1a2330;--ink:#e7eef6;--ink-mut:#8493a6;--ink-dim:#5d6b7d;--accent:#35d6c0;--accent-dim:#1d6b62;--on-call:#37c172;--na:#e5594f;--available:#35d6c0;--radius:10px}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:radial-gradient(1200px 600px at 80% -10%,#16202d 0%,transparent 60%),var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:14px;line-height:1.4;min-height:100vh;-webkit-font-smoothing:antialiased}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:1280px;margin:0 auto;padding:22px 22px 60px}
  header.topbar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .brand .mark{font-weight:700;font-size:20px;letter-spacing:-.02em}.brand .mark b{color:var(--accent)}
  .brand .sub{color:var(--ink-mut);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-left:8px}
  .org{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .org .label{font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.12em}.org .name{font-weight:600}
  .livechip{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-mut);padding:5px 10px;border:1px solid var(--line);border-radius:99px;background:var(--panel-2)}
  .livechip .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-dim)}
  .livechip.live .dot{background:var(--on-call)}.livechip.err .dot{background:var(--na)}
  button.refresh{font-family:inherit;font-size:13px;font-weight:600;color:#06231f;background:var(--accent);border:none;border-radius:8px;padding:9px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:filter .15s,opacity .15s}
  button.refresh:hover{filter:brightness(1.08)}button.refresh:disabled{opacity:.55;cursor:progress}
  button.refresh svg{width:14px;height:14px}button.refresh.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
  .stat{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-soft);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--ink-dim))}
  .stat .v{font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--c,var(--ink));line-height:1}
  .stat .k{font-size:11px;color:var(--ink-mut);text-transform:uppercase;letter-spacing:.08em;margin-top:8px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:inherit;font-size:13px;padding:9px 12px 9px 34px;outline:none}
  .search input:focus{border-color:var(--accent-dim)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-dim)}
  .toggle{font-size:12px;color:var(--ink-mut);display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel-2)}
  .toggle input{accent-color:var(--accent)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
  .panel-head h2{margin:0;font-size:13px;font-weight:600}.panel-head .meta{font-size:12px;color:var(--ink-dim)}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;min-width:980px}
  thead th{position:sticky;top:0;background:var(--panel-2);text-align:left;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-mut);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  thead th.num{text-align:right}
  thead th:hover{color:var(--ink)}thead th .arr{color:var(--accent);font-size:10px;margin-left:4px}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;white-space:nowrap}
  tbody td.num{text-align:right}
  tbody tr:hover{background:#172230}tbody tr:last-child td{border-bottom:none}
  .agent{display:flex;align-items:center;gap:11px}
  .ava{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:12px;font-weight:600;color:#0c1016;flex:none}
  .agent .nm{font-weight:600}.agent .em{font-size:11px;color:var(--ink-dim)}
  .bar{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end}
  .bar .t{font-weight:600}
  .dotc{width:8px;height:8px;border-radius:50%;display:inline-block}
  .tag{display:inline-block;font-size:11px;color:var(--ink-mut);background:var(--panel-2);border:1px solid var(--line-soft);border-radius:6px;padding:3px 8px}
  .grp{display:flex;gap:5px;flex-wrap:wrap;max-width:210px;white-space:normal}
  .muted{color:var(--ink-dim)}.zero{color:var(--ink-dim)}
  .empty{padding:46px 30px;text-align:center;color:var(--ink-mut)}
  footer{margin-top:16px;font-size:11px;color:var(--ink-dim);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .banner{display:none;margin-bottom:16px;border-radius:8px;padding:11px 14px;font-size:13px}
  .banner.warn{display:block;background:#221c10;border:1px solid #4a3c1d;color:#e9cf94}
  @media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>

<div class="wrap">
  <header class="topbar">
    <div class="brand"><span class="mark">Onyx<b>·</b>Ops</span><span class="sub">Today's Activity</span></div>
    <div class="org">
      <div><span class="label">Org</span> &nbsp;<span class="name">Auren Health</span></div>
      <div><span class="label">Profile</span> &nbsp;<span class="name">Inbound Home Health Agent</span></div>
      <span class="livechip" id="livechip"><span class="dot"></span><span id="livetxt">Loading…</span></span>
      <button class="refresh" id="refreshBtn" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <div class="banner" id="banner"></div>
  <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="Search agent, team, group…" oninput="render()">
    </div>
    <label class="toggle"><input type="checkbox" id="onlyActive" onchange="render()"> Only agents active today</label>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>Most Available today — sorted high to low</h2><span class="meta" id="rowmeta"></span></div>
    <div class="scroll"><table><thead><tr id="headrow"></tr></thead><tbody id="tbody"></tbody></table></div>
  </div>

  <footer>
    <span id="updstamp"></span><span>·</span>
    <span>Profile: Inbound Home Health Agent (511)</span><span>·</span>
    <span>Durations are today's running totals · refresh is manual</span>
  </footer>
</div>

<script>
const GROUPS={253:"Inbound Home Health Agent",367:"Sales Group STHHC",366:"STHHC V2",139:"Agent Medicare Inbound",243:"pc STHHC agents",128:"Agent Medicare Outbound"};
let agents=[], capturedAt=null;
let sortKey="available_sec", sortDir=-1;

const AVA=["#35d6c0","#5c8ff0","#e3a83b","#c879e8","#37c172","#e5594f","#4ec9b0","#f08a5d"];
const initials=n=>{const p=(n||"").trim().split(/\s+/);return ((p[0]||"")[0]||"")+((p[1]||"")[0]||"")};
const avaColor=id=>AVA[Math.abs(id)%AVA.length];
function fmt(sec){sec=Math.round(sec||0);if(sec<=0)return null;const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;if(h>0)return h+"h "+String(m).padStart(2,"0")+"m";if(m>0)return m+"m "+String(s).padStart(2,"0")+"s";return s+"s";}
function hrs(sec){return (sec/3600).toFixed(1);}

const HEADERS=[
  {k:"rank",t:"#",num:false},{k:"agent_name",t:"Agent Name",num:false},{k:"team_name",t:"Team",num:false},
  {k:"available_sec",t:"Available today",num:true}
];
function renderHead(){
  document.getElementById("headrow").innerHTML=HEADERS.map(h=>{
    let arr=sortKey===h.k?`<span class="arr">${sortDir<0?"▼":"▲"}</span>`:"";
    return `<th class="${h.num?'num':''}" onclick="setSort('${h.k}')">${h.t}${arr}</th>`;
  }).join("");
}
function renderStats(){
  const active=agents.filter(a=>a.active_today).length;
  const sum=k=>agents.reduce((t,a)=>t+(a[k]||0),0);
  const tiles=[
    {k:"Active today",v:active+" / "+agents.length,c:"--accent"},
    {k:"Total Available (hrs)",v:hrs(sum("available_sec")),c:"--available"}
  ];
  document.getElementById("stats").innerHTML=tiles.map(t=>`<div class="stat" style="--c:var(${t.c})"><div class="v">${t.v}</div><div class="k">${t.k}</div></div>`).join("");
}
function cell(sec,color){const f=fmt(sec);return f?`<span class="bar"><span class="dotc" style="background:var(${color})"></span><span class="t mono">${f}</span></span>`:`<span class="zero">—</span>`;}
function render(){
  const q=(document.getElementById("q").value||"").toLowerCase().trim();
  const onlyActive=document.getElementById("onlyActive").checked;
  let view=agents.filter(a=>{
    if(onlyActive && !a.active_today) return false;
    if(!q) return true;
    return [a.agent_name,a.team_name,...(a.license_states||[]),...(a.crm_group_ids||[]).map(g=>GROUPS[g]||g)].join(" ").toLowerCase().includes(q);
  });
  view.sort((x,y)=>{
    let a=x[sortKey],b=y[sortKey];
    if(sortKey==="license_states"||sortKey==="crm_group_ids"){a=(a||[]).length;b=(b||[]).length;}
    if(a==null)a=-Infinity;if(b==null)b=-Infinity;
    if(typeof a==="string")return a.localeCompare(b)*sortDir;
    return (a-b)*sortDir;
  });
  const tb=document.getElementById("tbody");
  if(!view.length){tb.innerHTML=`<tr><td colspan="4"><div class="empty">No agents match.</div></td></tr>`;}
  else tb.innerHTML=view.map((a,i)=>{
    const team=a.team_name?a.team_name:`<span class="muted">—</span>`;
    return `<tr>
      <td class="muted mono">${i+1}</td>
      <td><div class="agent"><div class="ava" style="background:${avaColor(a.user_id)}">${initials(a.agent_name)}</div><div><div class="nm">${a.agent_name}</div><div class="em">#${a.user_id}</div></div></div></td>
      <td>${team}</td>
      <td class="num">${cell(a.available_sec,'--available')}</td>
    </tr>`;
  }).join("");
  document.getElementById("rowmeta").textContent=`${view.length} of ${agents.length} agents`;
  renderStats();renderHead();
  if(capturedAt) document.getElementById("updstamp").textContent=`As of ${new Date(capturedAt).toLocaleString([], {hour:"2-digit",minute:"2-digit",second:"2-digit",month:"short",day:"numeric"})}`;
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==="agent_name"||k==="team_name")?1:-1;}render();}

async function loadData(){
  const btn=document.getElementById("refreshBtn"),chip=document.getElementById("livechip"),txt=document.getElementById("livetxt"),banner=document.getElementById("banner");
  btn.disabled=true;btn.classList.add("spin");
  try{
    const res=await fetch("/api/agents",{cache:"no-store"});
    const p=await res.json();
    agents=p.agents||[];capturedAt=p.captured_at;
    if(p.source==="live"){chip.className="livechip live";txt.textContent=p.cached?"Live (cached)":"Live";banner.className="banner";}
    else{chip.className="livechip err";txt.textContent="Error";banner.className="banner warn";banner.textContent=p.error?("Couldn't reach Onyx: "+p.error+" — showing roster with zero times."):"Showing roster only.";}
    render();
  }catch(e){
    chip.className="livechip err";txt.textContent="Offline";
    banner.className="banner warn";banner.textContent="Couldn't load: "+e.message;
  }finally{btn.disabled=false;btn.classList.remove("spin");}
}
loadData();
</script>
